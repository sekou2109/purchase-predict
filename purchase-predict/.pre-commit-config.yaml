repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.0
    hooks:
      # Run the linter.
      - id: ruff-check
        types_or: [python, pyi]
        # args: [--fix] # Optionnel : pour corriger auto les petites erreurs

      # Run the formatter.
      - id: ruff-format
        types_or: [python, pyi]