# Here you can define all your datasets by using simple YAML syntax.
#
# Documentation for this file format can be found in "The Data Catalog"
# Link: https://docs.kedro.org/en/stable/catalog-data/introduction/#data-catalog

primary:
  type: pandas.CSVDataset
  filepath: data/03_primary/primary.csv

dataset:
  type: pandas.CSVDataset
  filepath: data/04_feature/dataset.csv

X_train:
  type: pandas.CSVDataset
  filepath: data/05_model_input/X_train.csv

y_train:
  type: pandas.CSVDataset
  filepath: data/05_model_input/y_train.csv

X_test:
  type: pandas.CSVDataset
  filepath: data/05_model_input/X_test.csv

y_test:
  type: pandas.CSVDataset
  filepath: data/05_model_input/y_test.csv

transform_pipeline:
  type: pickle.PickleDataset
  filepath: data/04_feature/transform_pipeline.pkl

model:
  type: pickle.PickleDataset
  filepath: data/06_model/model.pkl

mlflow_run_id:
  type: MemoryDataset
